name: 공휴일 자동 갱신

# 매월 1일 자정 (UTC 15:00 = KST 00:00) + 수동 트리거
on:
  schedule:
    - cron: '0 15 1 * *'
  workflow_dispatch:
    inputs:
      years:
        description: '대상 연도 (콤마구분, 예: 2026,2027). 비우면 올해+다음해'
        required: false

concurrency:
  group: refresh-holidays
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Refresh holidays JSON
        env:
          PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}
          INPUT_YEARS: ${{ inputs.years }}
        run: |
          if [ -n "$INPUT_YEARS" ]; then
            node scripts/refresh-holidays.mjs --years="$INPUT_YEARS"
          else
            node scripts/refresh-holidays.mjs
          fi

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet apps/web/public/data/holidays/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(holidays): 공공데이터포털 자동 갱신"
          title: "chore(holidays): 공공데이터포털 자동 갱신"
          body: |
            정부 공공데이터포털 (SpcdeInfoService) 에서 가져온 연도별 공휴일 갱신.

            **검증 필수**:
            - [ ] `pnpm vitest run tests/unit/holidays-static-sync.test.js` 가 PASS 인지 (FAIL 이면 `packages/calculators/src/holidays.js` 의 `staticData` 도 같이 업데이트 필요)
            - [ ] 새 임시공휴일 (선거/대체공휴일 등) 의 `category` 분류가 적절한지

            자동 생성 (월간 cron)
          branch: chore/holidays-auto-refresh
          delete-branch: true
          labels: |
            holidays
            automated
