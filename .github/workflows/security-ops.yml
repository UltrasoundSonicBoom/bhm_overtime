name: Security Operations Gate

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'
  workflow_dispatch:

concurrency:
  group: security-ops-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-ops:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Setup Java for Firebase emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Python for backend tests
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip poetry
          poetry install --no-interaction --no-root

      - name: Astro check
        run: pnpm check

      - name: Astro build
        run: pnpm build

      - name: Data drift checks
        run: pnpm verify:data

      - name: Unit tests
        run: pnpm test:unit

      - name: Integration tests
        run: pnpm test:integration

      - name: Security contract and Firestore rules
        run: pnpm verify:security

      - name: Backend security tests
        run: pnpm backend:test

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright smoke
        run: pnpm test:smoke
