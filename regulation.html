<!DOCTYPE html>
<html lang="ko" data-theme="neo">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SNUH 메이트: 단체협약 규정 검색, AI 상담, FAQ">
  <title>SNUH 메이트 - 규정/상담</title>
  <link rel="manifest" href="manifest.json?v=1.3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SNUH 메이트">
  <link rel="apple-touch-icon" href="snuhmaterect.png?v=1.3">
  <link rel="icon" type="image/png" sizes="32x32" href="snuhmaterect.png?v=1.3">
  <link rel="icon" type="image/png" sizes="16x16" href="snuhmaterect.png?v=1.3">
  <link rel="shortcut icon" href="snuhmaterect.png?v=1.3">
  <link rel="stylesheet" href="style.css?v=2.5">
  <style>
    /* ═══════════ regulation.html — page-scoped styles ═══════════ */
    .main { max-width: 640px; }

    /* ═══════════ Bookmark Tabs ═══════════ */
    .reg-bookmark-tabs {
      display: flex;
      gap: 6px;
      padding: 0 16px;
      max-width: 640px;
      margin: 0 auto;
    }
    .reg-bookmark-tab {
      flex: 1;
      padding: 12px 8px 10px;
      border: none;
      border-radius: 12px 12px 0 0;
      font-size: var(--text-body-large);
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s ease-out;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      text-align: center;
    }
    /* Browse tab — blue */
    .reg-bookmark-tab[data-subtab="browse"] {
      background: rgba(96, 165, 250, 0.15);
      color: #1d4ed8;
      border-bottom: 3px solid transparent;
    }
    .reg-bookmark-tab[data-subtab="browse"].active {
      background: #60a5fa;
      color: #fff;
      border-bottom: 3px solid #2563eb;
      box-shadow: 0 2px 8px rgba(96, 165, 250, 0.3);
    }
    /* Ask tab — green */
    .reg-bookmark-tab[data-subtab="ask"] {
      background: rgba(74, 222, 128, 0.15);
      color: #15803d;
      border-bottom: 3px solid transparent;
    }
    .reg-bookmark-tab[data-subtab="ask"].active {
      background: #4ade80;
      color: #fff;
      border-bottom: 3px solid #16a34a;
      box-shadow: 0 2px 8px rgba(74, 222, 128, 0.3);
    }

    /* Neo theme bookmark overrides */
    html[data-theme="neo"] .reg-bookmark-tab {
      border: 2.5px solid #1a1a1a;
      border-bottom: none;
    }
    html[data-theme="neo"] .reg-bookmark-tab[data-subtab="browse"] {
      background: #e0f2fe;
      color: #1a1a1a;
    }
    html[data-theme="neo"] .reg-bookmark-tab[data-subtab="browse"].active {
      background: #60a5fa;
      color: #1a1a1a;
      box-shadow: 3px -2px 0px #1a1a1a;
    }
    html[data-theme="neo"] .reg-bookmark-tab[data-subtab="ask"] {
      background: #dcfce7;
      color: #1a1a1a;
    }
    html[data-theme="neo"] .reg-bookmark-tab[data-subtab="ask"].active {
      background: #4ade80;
      color: #1a1a1a;
      box-shadow: 3px -2px 0px #1a1a1a;
    }

    /* Tab content accent border top matching active tab color */
    .reg-tab-accent {
      height: 3px;
      border-radius: 0;
      margin: 0 16px;
      max-width: 640px;
      margin: 0 auto;
      transition: background 0.2s;
    }
    .reg-tab-accent.browse { background: #60a5fa; }
    .reg-tab-accent.ask { background: #4ade80; }

    /* ── Shared search input ── */
    .reg-search-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-full);
      background: var(--bg-glass);
      color: var(--text-primary);
      font-size: var(--text-body-large);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .reg-search-input:focus {
      border-color: var(--accent-indigo);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .reg-search-input::placeholder { color: var(--text-muted); }

    html[data-theme="neo"] .reg-search-input {
      border: 2px solid #1a1a1a;
      border-radius: var(--radius-full);
      background: var(--bg-card);
    }
    html[data-theme="neo"] .reg-search-input:focus {
      box-shadow: 3px 3px 0px var(--accent-indigo);
    }

    /* ── Accordion articles ── */
    .reg-article {
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .reg-article.open {
      border-color: var(--accent-indigo);
    }

    .reg-article-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      background: var(--bg-card);
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      gap: 8px;
    }
    .reg-article-header:active {
      background: var(--bg-glass);
    }
    .reg-article-title-group {
      min-width: 0;
      flex: 1;
    }
    .reg-article-title {
      font-size: var(--text-body-large);
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .reg-article-ref {
      font-size: var(--text-label-small);
      color: var(--text-muted);
      margin-top: 2px;
    }
    .reg-article-chevron {
      flex-shrink: 0;
      font-size: 14px;
      color: var(--text-muted);
      transition: transform 0.25s ease;
    }
    .reg-article.open .reg-article-chevron {
      transform: rotate(90deg);
      color: var(--accent-indigo);
    }

    .reg-article-body {
      display: none;
      padding: 0 16px 16px;
      animation: regFadeIn 0.2s ease;
    }
    .reg-article.open .reg-article-body {
      display: block;
    }
    .reg-article-content {
      font-size: var(--text-body-large);
      line-height: 1.75;
      color: var(--text-secondary);
      white-space: pre-line;
    }
    .reg-article-content .bullet {
      color: var(--accent-indigo);
    }
    .reg-article-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .reg-article-actions .btn-outline {
      font-size: var(--text-body-normal);
      padding: 6px 12px;
      border-radius: var(--radius-full);
    }

    @keyframes regFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    html[data-theme="neo"] .reg-article {
      border: 2.5px solid #1a1a1a;
      box-shadow: 3px 3px 0px #1a1a1a;
    }
    html[data-theme="neo"] .reg-article.open {
      border-color: var(--accent-violet);
      box-shadow: 3px 3px 0px var(--accent-violet);
    }
    html[data-theme="neo"] .reg-article-header:active {
      background: var(--bg-glass);
    }
    html[data-theme="neo"] .reg-article.open .reg-article-chevron {
      color: var(--accent-violet);
    }

    /* ── Search results highlight ── */
    .reg-highlight {
      background: rgba(251,191,36,0.3);
      padding: 0 2px;
      border-radius: 2px;
    }
    html[data-theme="neo"] .reg-highlight {
      background: rgba(253,203,110,0.5);
    }

    /* ── Empty/placeholder state ── */
    .reg-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }
    .reg-empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.6;
    }
    .reg-empty-text {
      font-size: var(--text-body-large);
      line-height: 1.6;
    }

    /* ═══════════ 물어보기: chat ═══════════ */
    .reg-chat-container {
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      height: calc(100vh - 220px);
      min-height: 300px;
      max-height: 700px;
    }
    html[data-theme="neo"] .reg-chat-container {
      border: 2.5px solid #1a1a1a;
      box-shadow: 3px 3px 0px #1a1a1a;
    }
    .reg-chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-glass);
      flex-shrink: 0;
    }
    html[data-theme="neo"] .reg-chat-header {
      border-bottom: 2px solid #1a1a1a;
    }
    .reg-chat-test-notice {
      font-size: var(--text-body-normal);
      color: #16a34a;
      font-weight: 600;
      margin-top: 4px;
    }
    .reg-chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .reg-chat-messages::-webkit-scrollbar { width: 4px; }
    .reg-chat-messages::-webkit-scrollbar-thumb {
      background: var(--border-glass);
      border-radius: var(--radius-full);
    }
    /* user = left, bot = right */
    .reg-chat-messages .chat-msg.user {
      align-self: flex-start;
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      color: var(--text-primary);
    }
    .reg-chat-messages .chat-msg.bot {
      align-self: flex-end;
      background: var(--accent-indigo);
      color: #fff;
    }
    html[data-theme="neo"] .reg-chat-messages .chat-msg.user {
      border: 2px solid #1a1a1a;
      box-shadow: 2px 2px 0px #1a1a1a;
      background: var(--bg-card);
    }
    html[data-theme="neo"] .reg-chat-messages .chat-msg.bot {
      border: 2px solid #1a1a1a;
      box-shadow: 2px 2px 0px #1a1a1a;
    }
    .reg-chat-messages .chat-msg.bot .ref {
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.15);
    }
    .reg-chat-messages .chat-msg.bot small {
      color: rgba(255,255,255,0.8);
    }
    .reg-chat-input-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border-glass);
      flex-shrink: 0;
    }
    html[data-theme="neo"] .reg-chat-input-row {
      border-top: 2px solid #1a1a1a;
    }

    /* ── PDF bottom sheet ── */
    .pdf-sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 500;
      animation: regFadeIn 0.15s ease;
    }
    .pdf-sheet-overlay.active { display: block; }

    .pdf-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 85vh;
      background: var(--bg-primary);
      border-radius: 16px 16px 0 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 501;
      animation: sheetSlideUp 0.3s ease;
    }
    @keyframes sheetSlideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    html[data-theme="neo"] .pdf-sheet {
      border: 3px solid #1a1a1a;
      border-bottom: none;
      background: var(--bg-card);
    }

    .pdf-sheet-handle {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .pdf-sheet-handle::after {
      content: '';
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--border-glass);
    }
    html[data-theme="neo"] .pdf-sheet-handle::after {
      background: #1a1a1a;
    }

    .pdf-sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--border-glass);
    }
    html[data-theme="neo"] .pdf-sheet-header {
      border-bottom: 2px solid #1a1a1a;
    }
    .pdf-sheet-title {
      font-size: var(--text-body-large);
      font-weight: 600;
      color: var(--text-primary);
    }
    .pdf-sheet-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border-glass);
      background: var(--bg-glass);
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .pdf-sheet-close:hover {
      border-color: var(--border-active);
      color: var(--text-primary);
    }
    html[data-theme="neo"] .pdf-sheet-close {
      border: 2px solid #1a1a1a;
      background: var(--bg-card);
      font-weight: 700;
    }

    .pdf-sheet-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-glass);
    }
    .pdf-sheet-controls .btn-outline {
      padding: 6px 14px;
      font-size: var(--text-body-normal);
    }
    .pdf-page-info {
      font-size: var(--text-body-normal);
      color: var(--text-secondary);
      min-width: 60px;
      text-align: center;
    }

    .pdf-sheet-body {
      flex: 1;
      overflow: auto;
      padding: 16px;
      text-align: center;
      -webkit-overflow-scrolling: touch;
    }
    .pdf-sheet-body canvas {
      max-width: 100%;
      border-radius: var(--radius-md);
    }

    /* ═══════════ Mobile ═══════════ */
    @media (max-width: 768px) {
      .main { max-width: 100%; padding: 16px 12px 88px; }
      .reg-bookmark-tabs { padding: 0 12px; gap: 6px; }
      .reg-bookmark-tab { font-size: var(--text-body-large); padding: 12px 8px 10px; }
      .reg-article-header { padding: 12px 14px; }
      .reg-chat-container {
        height: calc(100vh - 200px);
        max-height: none;
      }
    }
  </style>
</head>

<body>
  <!-- ═══════════ Header & Footer (shared-layout.js에서 렌더) ═══════════ -->
  <header id="sharedHeader"></header>
  <nav id="sharedFooter"></nav>
  <script src="shared-layout.js?v=1.0"></script>

  <!-- ═══════════ Bookmark Tabs — below header ═══════════ -->
  <nav class="reg-bookmark-tabs" id="regSubTabs">
    <button class="reg-bookmark-tab active" data-subtab="browse">찾아보기</button>
    <button class="reg-bookmark-tab" data-subtab="ask">물어보기</button>
  </nav>
  <div class="reg-tab-accent browse" id="regTabAccent"></div>

  <main class="main">

    <!-- ═══════════ 찾아보기 (FAQ 통합) ═══════════ -->
    <div class="sub-content active" id="subtab-browse">
      <!-- 검색 -->
      <div class="card" style="padding:12px 16px; margin-bottom:16px;">
        <input type="text" id="browseSearch" class="reg-search-input"
          placeholder="규정·FAQ 검색... (예: 온콜 수당, 연차, 경조비)" style="width:100%;">
      </div>
      <!-- 카테고리 필터 -->
      <div class="quick-tags" id="browseCategoryTags" style="margin-bottom:16px;"></div>
      <!-- 규정 + FAQ 통합 목록 -->
      <div id="browseArticles"></div>
    </div>

    <!-- ═══════════ 물어보기 ═══════════ -->
    <div class="sub-content" id="subtab-ask">
      <div class="reg-chat-container">
        <div class="reg-chat-header">
          <div class="card-title" style="margin-bottom:0;">
            <span class="icon indigo">💬</span> 규정 AI 상담
            <span class="badge indigo">2026 단체협약</span>
          </div>
          <div class="reg-chat-test-notice">AI 답변은 현재는 예시입니다. 현재 테스트 중입니다.</div>
        </div>
        <div class="reg-chat-messages" id="chatMessages">
          <div class="chat-msg bot">
            궁금한 규정을 물어보세요!<br>
            <small style="opacity:0.85">예: "온콜 수당 얼마?", "연차 몇 일?", "경조 휴가"</small>
          </div>
        </div>
        <div class="reg-chat-input-row">
          <input type="text" class="chat-input" id="chatInput"
            placeholder="궁금한 점을 입력하세요..." autocomplete="off">
          <button class="chat-send" id="chatSend" title="전송">➤</button>
        </div>
      </div>
    </div>

  </main>

  <!-- ═══════════ PDF 바텀시트 ═══════════ -->
  <div class="pdf-sheet-overlay" id="pdfOverlay">
    <div class="pdf-sheet" id="pdfSheet">
      <div class="pdf-sheet-handle"></div>
      <div class="pdf-sheet-header">
        <span class="pdf-sheet-title" id="pdfSheetTitle">PDF 원문</span>
        <button class="pdf-sheet-close" id="pdfClose" title="닫기">✕</button>
      </div>
      <div class="pdf-sheet-controls">
        <button class="btn btn-outline" onclick="pdfPrevPage()">◀</button>
        <span id="pdfPageInfo" class="pdf-page-info">- / -</span>
        <button class="btn btn-outline" onclick="pdfNextPage()">▶</button>
        <span style="width:1px; height:20px; background:var(--border-glass);"></span>
        <button class="btn btn-outline" onclick="pdfZoom(-0.25)">−</button>
        <span id="pdfZoomInfo" class="pdf-page-info">100%</span>
        <button class="btn btn-outline" onclick="pdfZoom(0.25)">+</button>
      </div>
      <div class="pdf-sheet-body" id="pdfSheetBody">
        <canvas id="pdfCanvas"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js?v=1.4"></script>
  <script src="data.js?v=2.5"></script>
  <script src="profile.js?v=2.5"></script>
  <script src="calculators.js?v=2.5"></script>
  <script src="regulation.js?v=2.3"></script>
  <style>
    #ch-plugin-script-iframe { max-width: 500px !important; }
  </style>
</body>

</html>
