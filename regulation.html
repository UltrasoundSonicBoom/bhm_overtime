<!DOCTYPE html>
<html lang="ko" data-theme="neo">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SNUH 메이트: 단체협약 규정 검색, AI 상담, FAQ">
  <title>SNUH 메이트 - 규정/상담</title>
  <link rel="manifest" href="manifest.json?v=1.3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SNUH 메이트">
  <link rel="apple-touch-icon" href="snuhmaterect.png?v=1.3">
  <link rel="icon" type="image/png" sizes="32x32" href="snuhmaterect.png?v=1.3">
  <link rel="icon" type="image/png" sizes="16x16" href="snuhmaterect.png?v=1.3">
  <link rel="shortcut icon" href="snuhmaterect.png?v=1.3">
  <link rel="stylesheet" href="style.css?v=2.6">
  <style>
    /* ═══════════ regulation.html — page-scoped styles ═══════════ */
    .main { max-width: 640px; }

    /* ═══════════ Bookmark Tabs ═══════════ */
    .reg-bookmark-tabs {
      display: flex;
      gap: 6px;
      padding: 0 16px;
      max-width: 640px;
      margin: 0 auto;
    }
    .reg-bookmark-tab {
      flex: 1;
      padding: 12px 8px 10px;
      border: none;
      border-radius: 12px 12px 0 0;
      font-size: var(--text-body-large);
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s ease-out;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      text-align: center;
    }
    /* Browse tab — blue */
    .reg-bookmark-tab[data-subtab="browse"] {
      background: rgba(96, 165, 250, 0.15);
      color: #1d4ed8;
      border-bottom: 3px solid transparent;
    }
    .reg-bookmark-tab[data-subtab="browse"].active {
      background: #60a5fa;
      color: #fff;
      border-bottom: 3px solid #2563eb;
      box-shadow: 0 2px 8px rgba(96, 165, 250, 0.3);
    }
    /* Ask tab — green */
    .reg-bookmark-tab[data-subtab="ask"] {
      background: rgba(74, 222, 128, 0.15);
      color: #15803d;
      border-bottom: 3px solid transparent;
    }
    .reg-bookmark-tab[data-subtab="ask"].active {
      background: #4ade80;
      color: #fff;
      border-bottom: 3px solid #16a34a;
      box-shadow: 0 2px 8px rgba(74, 222, 128, 0.3);
    }

    /* Neo theme bookmark overrides */
    html[data-theme="neo"] .reg-bookmark-tab {
      border: 2.5px solid #1a1a1a;
      border-bottom: none;
    }
    html[data-theme="neo"] .reg-bookmark-tab[data-subtab="browse"] {
      background: #e0f2fe;
      color: #1a1a1a;
    }
    html[data-theme="neo"] .reg-bookmark-tab[data-subtab="browse"].active {
      background: #60a5fa;
      color: #1a1a1a;
      box-shadow: 3px -2px 0px #1a1a1a;
    }
    html[data-theme="neo"] .reg-bookmark-tab[data-subtab="ask"] {
      background: #dcfce7;
      color: #1a1a1a;
    }
    html[data-theme="neo"] .reg-bookmark-tab[data-subtab="ask"].active {
      background: #4ade80;
      color: #1a1a1a;
      box-shadow: 3px -2px 0px #1a1a1a;
    }

    /* Tab content accent border top matching active tab color */
    .reg-tab-accent {
      height: 3px;
      border-radius: 0;
      margin: 0 16px;
      max-width: 640px;
      margin: 0 auto;
      transition: background 0.2s;
    }
    .reg-tab-accent.browse { background: #60a5fa; }
    .reg-tab-accent.ask { background: #4ade80; }

    /* ── Shared search input ── */
    .reg-search-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-full);
      background: var(--bg-glass);
      color: var(--text-primary);
      font-size: var(--text-body-large);
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .reg-search-input:focus {
      border-color: var(--accent-indigo);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .reg-search-input::placeholder { color: var(--text-muted); }

    html[data-theme="neo"] .reg-search-input {
      border: 2px solid #1a1a1a;
      border-radius: var(--radius-full);
      background: var(--bg-card);
    }
    html[data-theme="neo"] .reg-search-input:focus {
      box-shadow: 3px 3px 0px var(--accent-indigo);
    }

    /* ── 안내 배너 (원문 번호 유지 정책) ── */
    .reg-info-banner {
      margin: 0 16px 10px;
      padding: 10px 12px;
      background: #fffbeb;
      border: 1.5px solid #eab308;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.5;
      color: #422;
    }
    html[data-theme="neo"] .reg-info-banner {
      border: 2px solid #1a1a1a;
      box-shadow: 2px 2px 0 #1a1a1a;
    }

    /* ── 장 탭 내 개수 표시 ── */
    .reg-chapter-tab-count {
      display: inline-block;
      margin-left: 4px;
      padding: 1px 5px;
      font-size: 10px;
      font-weight: 700;
      background: rgba(0,0,0,0.08);
      border-radius: 8px;
      color: inherit;
      opacity: 0.75;
    }
    .reg-chapter-tab.active .reg-chapter-tab-count {
      background: rgba(0,0,0,0.18);
      opacity: 1;
    }

    /* ── 섹션 라벨 (목차 / 즐겨찾기) ── */
    .reg-section-label {
      font-size: var(--text-label-small);
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 16px;
      margin: 10px 0 6px;
    }

    /* ── 장(Chapter) 탭 — 가로 스크롤 ── */
    .reg-chapter-tabs {
      display: flex;
      gap: 6px;
      padding: 0 16px 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .reg-chapter-tabs::-webkit-scrollbar { display: none; }
    .reg-chapter-tab {
      flex-shrink: 0;
      padding: 7px 12px;
      border: 2px solid var(--text-primary);
      border-radius: var(--radius-full);
      font-size: var(--text-body-normal);
      font-weight: 700;
      font-family: inherit;
      background: var(--bg-card);
      color: var(--text-primary);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .reg-chapter-tab.active {
      background: var(--accent-indigo);
      color: #fff;
      box-shadow: 2px 2px 0 var(--text-primary);
    }
    html[data-theme="neo"] .reg-chapter-tab {
      border: 2px solid #1a1a1a;
    }
    html[data-theme="neo"] .reg-chapter-tab.active {
      background: #60a5fa;
      color: #1a1a1a;
      box-shadow: 2px 2px 0 #1a1a1a;
    }

    /* ── 장 탭 좌우 화살표 (flex 레이아웃: 좌 화살표 | 스크롤 영역 | 우 화살표) ── */
    .reg-chapter-nav-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px 6px;
      max-width: 640px;
      margin: 0 auto;
    }
    .reg-chapter-nav-wrap .reg-chapter-tabs {
      flex: 1;
      min-width: 0;
      padding: 2px 2px;
      scroll-behavior: smooth;
      /* 부모 padding 제거: 부모 래퍼가 16px 이미 제공 */
    }
    /* 부모가 flex라 별도 바깥 패딩 불필요 */
    .reg-chapter-arrow {
      flex-shrink: 0;
      width: 30px;
      height: 30px;
      border: 2px solid var(--text-primary);
      border-radius: 50%;
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 800;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 2px 2px 0 var(--text-primary);
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .reg-chapter-arrow:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }
    html[data-theme="neo"] .reg-chapter-arrow {
      border-color: #1a1a1a;
      box-shadow: 2px 2px 0 #1a1a1a;
    }

    /* ── 즐겨찾기 칩 — 가로 스크롤 ── */
    .reg-fav-chips {
      display: flex;
      gap: 8px;
      padding: 0 16px 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      min-height: 38px;
    }
    .reg-fav-chips::-webkit-scrollbar { display: none; }
    .reg-fav-chip {
      flex-shrink: 0;
      padding: 7px 12px;
      border: 2px solid var(--text-primary);
      border-radius: var(--radius-full);
      font-size: var(--text-body-normal);
      font-weight: 700;
      font-family: inherit;
      background: #fff8e1;
      color: var(--text-primary);
      cursor: pointer;
      box-shadow: 2px 2px 0 var(--text-primary);
      white-space: nowrap;
      transition: all 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .reg-fav-chip:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }
    html[data-theme="neo"] .reg-fav-chip {
      border: 2px solid #1a1a1a;
      box-shadow: 2px 2px 0 #1a1a1a;
    }
    .reg-fav-chips-empty {
      font-size: var(--text-body-normal);
      color: var(--text-muted);
      padding: 8px 4px;
      font-style: italic;
    }

    /* ── 확장 카드 내 박스 공통 라벨 ── */
    .reg-box-label {
      display: inline-block;
      font-size: 10px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .reg-box-label-orig { background: var(--text-primary); color: var(--bg-primary, #fff); }
    .reg-box-label-contact { background: #0ea5e9; color: #fff; }
    html[data-theme="neo"] .reg-box-label-orig { background: #1a1a1a; color: #fff; }

    /* ── 주황 원문 박스 ── */
    .reg-box-orig {
      background: #fff4e0;
      border: 2px solid var(--text-primary);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
      box-shadow: 2px 2px 0 var(--text-primary);
    }
    html[data-theme="neo"] .reg-box-orig {
      border-color: #1a1a1a;
      box-shadow: 2px 2px 0 #1a1a1a;
    }
    .reg-orig-lead {
      font-size: var(--text-body-large);
      line-height: 1.65;
      color: var(--text-primary);
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px dashed rgba(0,0,0,0.12);
    }

    /* ── 불렛 clause 리스트 ── */
    .reg-clause-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .reg-clause-list li {
      position: relative;
      padding: 8px 0 8px 32px;
      font-size: var(--text-body-large);
      line-height: 1.7;
      color: var(--text-primary);
      border-bottom: 1px dashed rgba(0,0,0,0.1);
    }
    .reg-clause-list li:last-child { border-bottom: none; }
    .reg-clause-num {
      position: absolute;
      left: 0;
      top: 10px;
      font-size: 11px;
      font-weight: 800;
      color: var(--text-primary);
      background: rgba(255,204,77,0.55);
      border: 1px solid var(--text-primary);
      border-radius: 4px;
      padding: 1px 6px;
      min-width: 24px;
      text-align: center;
      line-height: 1.3;
    }
    html[data-theme="neo"] .reg-clause-num {
      border-color: #1a1a1a;
    }

    /* ── 데이터 표 (보수표, 퇴직금 지급률, 건강진단 등) ── */
    .reg-data-table-wrap {
      margin: 12px 0 8px;
    }
    .reg-data-table-title {
      font-size: 11px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 6px;
      padding-left: 2px;
    }
    .reg-data-table-scroll {
      overflow-x: auto;
      border: 1.5px solid var(--text-primary);
      border-radius: 6px;
      background: #fff;
    }
    html[data-theme="neo"] .reg-data-table-scroll { border-color: #1a1a1a; }
    .reg-data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      line-height: 1.4;
    }
    .reg-data-table th {
      background: rgba(255,204,77,0.28);
      border-bottom: 1.5px solid var(--text-primary);
      border-right: 1px solid rgba(0,0,0,0.15);
      padding: 6px 8px;
      font-weight: 800;
      text-align: left;
      white-space: nowrap;
    }
    .reg-data-table td {
      border-bottom: 1px solid rgba(0,0,0,0.08);
      border-right: 1px solid rgba(0,0,0,0.08);
      padding: 6px 8px;
      white-space: nowrap;
    }
    .reg-data-table th:last-child, .reg-data-table td:last-child { border-right: none; }
    .reg-data-table tr:last-child td { border-bottom: none; }
    html[data-theme="neo"] .reg-data-table th {
      border-bottom-color: #1a1a1a;
      border-right-color: rgba(26,26,26,0.15);
    }

    /* ── 부속 합의 박스 (라벤더) ── */
    .reg-box-related {
      background: #eef2ff;
      border: 2px solid var(--text-primary);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
      box-shadow: 2px 2px 0 var(--text-primary);
    }
    html[data-theme="neo"] .reg-box-related {
      border-color: #1a1a1a;
      box-shadow: 2px 2px 0 #1a1a1a;
    }
    .reg-box-label-related { background: #6366f1; color: #fff; }
    .reg-related-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .reg-related-content {
      font-size: 12.5px;
      line-height: 1.65;
      color: var(--text-primary);
      white-space: pre-line;
    }

    /* ── 제정/개정 이력 태그 ── */
    .reg-history-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      background: #bff0cf;
      border: 1px solid var(--text-primary);
      border-radius: 4px;
      padding: 2px 7px;
      margin-top: 10px;
      margin-right: 4px;
    }
    html[data-theme="neo"] .reg-history-tag {
      border-color: #1a1a1a;
    }

    /* ── 계산기 박스 (indigo) ── */
    .reg-box-calc {
      padding: 10px 12px;
      background: rgba(99,102,241,0.08);
      border: 1.5px solid rgba(99,102,241,0.25);
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .reg-box-calc-title {
      font-size: var(--text-body-normal);
      font-weight: 700;
      color: var(--accent-indigo);
      margin-bottom: 8px;
    }
    .reg-box-calc-row {
      display: flex;
      justify-content: space-between;
      font-size: var(--text-body-large);
      padding: 3px 0;
    }
    .reg-box-calc-label { color: var(--text-muted); }
    .reg-box-calc-value { font-weight: 700; color: var(--text-primary); }
    .reg-box-calc-empty {
      background: rgba(99,102,241,0.04);
      border-style: dashed;
      border-color: rgba(99,102,241,0.2);
      color: var(--text-muted);
      font-size: var(--text-body-normal);
      text-align: center;
      padding: 12px;
    }
    .reg-box-calc-empty a { color: var(--accent-indigo); }

    /* ── 파랑 연락망 박스 (3 버튼 통합) ── */
    .reg-box-contact {
      background: #e0f2fe;
      border: 2px solid var(--text-primary);
      border-radius: 10px;
      padding: 12px 14px;
      box-shadow: 2px 2px 0 var(--text-primary);
    }
    html[data-theme="neo"] .reg-box-contact {
      border-color: #1a1a1a;
      box-shadow: 2px 2px 0 #1a1a1a;
    }
    .reg-contact-dept {
      font-size: var(--text-body-large);
      font-weight: 700;
      margin-bottom: 10px;
    }

    /* ── 카드 헤더: 미리보기 텍스트 ── */
    .reg-article-preview {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── 아티클 헤더: 조항 번호 배지 + 별 ── */
    .reg-article-num {
      font-size: var(--text-label-small);
      font-weight: 800;
      background: var(--accent-indigo-soft, rgba(99,102,241,0.15));
      border: 1.5px solid var(--text-primary);
      border-radius: 6px;
      padding: 3px 8px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
      color: var(--text-primary);
    }
    html[data-theme="neo"] .reg-article-num {
      background: #e0e7ff;
      border-color: #1a1a1a;
    }
    .reg-article-fav {
      flex-shrink: 0;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      color: var(--text-muted);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .reg-article-fav.active {
      color: #ffb800;
    }

    /* ── 확장 카드 내부 ── */
    .reg-article-calc-block {
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(99,102,241,0.06);
      border: 1.5px solid rgba(99,102,241,0.18);
      border-radius: var(--radius-md);
    }
    .reg-article-calc-title {
      font-size: var(--text-body-normal);
      font-weight: 700;
      color: var(--accent-indigo);
      margin-bottom: 6px;
    }
    .reg-article-calc-row {
      display: flex;
      justify-content: space-between;
      font-size: var(--text-body-normal);
      padding: 2px 0;
    }
    .reg-article-calc-label { color: var(--text-muted); }
    .reg-article-calc-value { font-weight: 700; color: var(--text-primary); }

    /* ── 3 액션 버튼 그리드 (PDF / 전화 / 이메일) ── */
    .reg-action-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    /* ── 4 액션 버튼 그리드 (PDF / 전화 / 이메일 / AI 질문) ── */
    .reg-action-grid-4 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 6px;
    }
    @media (max-width: 380px) {
      .reg-action-grid-4 {
        grid-template-columns: 1fr 1fr;
      }
    }
    .reg-action-btn.btn-ai { background: #fff; }
    .reg-action-btn {
      padding: 10px 6px;
      border: 2px solid var(--text-primary);
      border-radius: var(--radius-md);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: var(--text-body-normal);
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      box-shadow: 2px 2px 0 var(--text-primary);
      transition: all 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
      line-height: 1.3;
      text-decoration: none;
    }
    .reg-action-btn:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }
    .reg-action-btn.btn-pdf { background: #fff; }
    .reg-action-btn.btn-call { background: #fff; }
    .reg-action-btn.btn-mail { background: #fff; }
    html[data-theme="neo"] .reg-action-btn {
      border-color: #1a1a1a;
      box-shadow: 2px 2px 0 #1a1a1a;
    }
    .reg-action-btn-sub {
      font-size: 9px;
      color: var(--text-muted);
      font-weight: 600;
      margin-top: 3px;
      line-height: 1.2;
    }
    /* legacy alias 유지 — 기존 CSS 리테이너 */
    .reg-action-btn-phone {
      font-size: 9px;
      color: var(--text-muted);
      font-weight: 600;
      margin-top: 2px;
    }

    /* ── Accordion articles ── */
    .reg-article {
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-md);
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .reg-article.open {
      border-color: var(--accent-indigo);
    }

    .reg-article-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      background: var(--bg-card);
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
      gap: 8px;
    }
    .reg-article-header:active {
      background: var(--bg-glass);
    }
    .reg-article-title-group {
      min-width: 0;
      flex: 1;
    }
    .reg-article-title {
      font-size: var(--text-body-large);
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .reg-article-ref {
      font-size: var(--text-label-small);
      color: var(--text-muted);
      margin-top: 2px;
    }
    .reg-article-chevron {
      flex-shrink: 0;
      font-size: 14px;
      color: var(--text-muted);
      transition: transform 0.25s ease;
    }
    .reg-article.open .reg-article-chevron {
      transform: rotate(90deg);
      color: var(--accent-indigo);
    }

    .reg-article-body {
      display: none;
      padding: 0 16px 16px;
      animation: regFadeIn 0.2s ease;
    }
    .reg-article.open .reg-article-body {
      display: block;
    }
    .reg-article-content {
      font-size: var(--text-body-large);
      line-height: 1.75;
      color: var(--text-secondary);
      white-space: pre-line;
    }
    .reg-article-content .bullet {
      color: var(--accent-indigo);
    }
    .reg-article-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .reg-article-actions .btn-outline {
      font-size: var(--text-body-normal);
      padding: 6px 12px;
      border-radius: var(--radius-full);
    }

    @keyframes regFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    html[data-theme="neo"] .reg-article {
      border: 2.5px solid #1a1a1a;
      box-shadow: 3px 3px 0px #1a1a1a;
    }
    html[data-theme="neo"] .reg-article.open {
      border-color: var(--accent-violet);
      box-shadow: 3px 3px 0px var(--accent-violet);
    }
    html[data-theme="neo"] .reg-article-header:active {
      background: var(--bg-glass);
    }
    html[data-theme="neo"] .reg-article.open .reg-article-chevron {
      color: var(--accent-violet);
    }

    /* ── Search results highlight ── */
    .reg-highlight {
      background: rgba(251,191,36,0.3);
      padding: 0 2px;
      border-radius: 2px;
    }
    html[data-theme="neo"] .reg-highlight {
      background: rgba(253,203,110,0.5);
    }

    /* ── Empty/placeholder state ── */
    .reg-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }
    .reg-empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.6;
    }
    .reg-empty-text {
      font-size: var(--text-body-large);
      line-height: 1.6;
    }

    /* ═══════════ 물어보기: chat (redesigned) ═══════════ */
    .reg-chat-container {
      display: flex;
      flex-direction: column;
      background: #fff;
      border: 2.5px solid #1a1a1a;
      border-radius: 18px;
      height: calc(100dvh - 240px);
      min-height: 400px;
      max-height: 700px;
      box-shadow: 4px 4px 0 #1a1a1a;
      overflow: hidden;
    }
    .reg-chat-header {
      padding: 13px 16px 11px;
      border-bottom: 2.5px solid #1a1a1a;
      background: #fff;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .chat-header-avatar {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      border: 2px solid #1a1a1a;
      object-fit: cover;
      flex-shrink: 0;
    }
    .chat-header-info { flex: 1; }
    .chat-header-title {
      font-size: 15px;
      font-weight: 800;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: -0.2px;
    }
    .chat-header-badge {
      font-size: 11px;
      font-weight: 700;
      background: #6366f1;
      color: #fff;
      border: 1.5px solid #1a1a1a;
      border-radius: 20px;
      padding: 1px 8px;
    }
    .chat-header-sub {
      font-size: 11.5px;
      color: #16a34a;
      font-weight: 600;
      margin-top: 2px;
    }
    /* ── messages area ── */
    .reg-chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      background: #f7f7f8;
    }
    .reg-chat-messages::-webkit-scrollbar { width: 4px; }
    .reg-chat-messages::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 4px;
    }
    /* ── chat row (avatar + bubble) ── */
    .chat-row {
      display: flex;
      align-items: flex-end;
      gap: 7px;
      max-width: 86%;
    }
    .chat-row.user {
      align-self: flex-start;
      flex-direction: row;
    }
    .chat-row.bot {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    /* avatar */
    .chat-avatar-img {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 2px solid #1a1a1a;
      object-fit: cover;
      flex-shrink: 0;
    }
    .chat-avatar-user {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      border: 2px solid #1a1a1a;
      background: #6366f1;
      color: #fff;
      font-size: 13px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    /* bubble wrap */
    .chat-bubble-wrap {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .chat-row.user .chat-bubble-wrap { align-items: flex-start; }
    .chat-row.bot .chat-bubble-wrap  { align-items: flex-end; }
    /* name label */
    .chat-name-label {
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      padding: 0 3px;
    }
    /* bubble */
    .chat-bubble {
      border-radius: 16px;
      padding: 11px 14px;
      font-size: 14px;
      line-height: 1.65;
      word-break: break-word;
      border: 2px solid #1a1a1a;
      box-shadow: 2px 2px 0 #1a1a1a;
      max-width: 100%;
    }
    .chat-row.user .chat-bubble {
      background: #fff;
      color: #1a1a1a;
      border-radius: 14px 14px 14px 4px;
    }
    .chat-row.bot .chat-bubble {
      background: #f0f0fe;
      color: #1a1a1a;
      border-radius: 14px 14px 4px 14px;
      /* override CSS vars so renderHandbookSource() inline styles render correctly */
      --text-primary: #1a1a1a;
      --text-secondary: #4b5563;
      --text-muted: #6b7280;
      --accent-indigo: #6366f1;
    }
    /* source refs */
    .chat-refs {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #d1d5db;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .chat-ref-tag {
      font-size: 11px;
      background: #e0e7ff;
      border: 1px solid #a5b4fc;
      border-radius: 20px;
      padding: 2px 8px;
      color: #4338ca;
      font-weight: 600;
    }
    /* related FAQ inside bot bubble */
    .chat-related {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #d1d5db;
    }
    .chat-related-title {
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .chat-related-link {
      display: block;
      font-size: 12.5px;
      color: #4338ca;
      cursor: pointer;
      padding: 3px 0;
      text-decoration: underline;
      text-decoration-color: #a5b4fc;
    }
    .chat-related-link:hover { color: #6366f1; }
    /* typing dots */
    .chat-typing-dots {
      display: flex;
      gap: 5px;
      padding: 2px 0;
      align-items: center;
    }
    .chat-typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #6366f1;
      animation: chatDot 1.2s infinite ease-in-out;
    }
    .chat-typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .chat-typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes chatDot {
      0%,80%,100% { transform: scale(0.65); opacity: 0.45; }
      40% { transform: scale(1); opacity: 1; }
    }
    /* input row */
    .reg-chat-input-row {
      display: flex;
      gap: 8px;
      padding: 11px 13px;
      border-top: 2.5px solid #1a1a1a;
      background: #fff;
      flex-shrink: 0;
      align-items: center;
    }
    .chat-input {
      flex: 1;
      border: 2px solid #1a1a1a;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      background: #f7f7f8;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: inherit;
    }
    .chat-input:focus {
      border-color: #6366f1;
      box-shadow: 2px 2px 0 #6366f1;
      background: #fff;
    }
    .chat-send {
      width: 42px; height: 42px;
      border-radius: 12px;
      border: 2px solid #1a1a1a;
      background: #6366f1;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 2px 2px 0 #1a1a1a;
      transition: transform 0.1s, box-shadow 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
    }
    .chat-send:active { transform: translate(2px,2px); box-shadow: none; }

    /* ── PDF bottom sheet ── */
    .pdf-sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 500;
      animation: regFadeIn 0.15s ease;
    }
    .pdf-sheet-overlay.active { display: block; }

    .pdf-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 85vh;
      background: var(--bg-primary);
      border-radius: 16px 16px 0 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 501;
      animation: sheetSlideUp 0.3s ease;
    }
    @keyframes sheetSlideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    html[data-theme="neo"] .pdf-sheet {
      border: 3px solid #1a1a1a;
      border-bottom: none;
      background: var(--bg-card);
    }

    .pdf-sheet-handle {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .pdf-sheet-handle::after {
      content: '';
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: var(--border-glass);
    }
    html[data-theme="neo"] .pdf-sheet-handle::after {
      background: #1a1a1a;
    }

    .pdf-sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 12px;
      border-bottom: 1px solid var(--border-glass);
    }
    html[data-theme="neo"] .pdf-sheet-header {
      border-bottom: 2px solid #1a1a1a;
    }
    .pdf-sheet-title {
      font-size: var(--text-body-large);
      font-weight: 600;
      color: var(--text-primary);
    }
    .pdf-sheet-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border-glass);
      background: var(--bg-glass);
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .pdf-sheet-close:hover {
      border-color: var(--border-active);
      color: var(--text-primary);
    }
    html[data-theme="neo"] .pdf-sheet-close {
      border: 2px solid #1a1a1a;
      background: var(--bg-card);
      font-weight: 700;
    }

    .pdf-sheet-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-glass);
    }
    .pdf-sheet-controls .btn-outline {
      padding: 6px 14px;
      font-size: var(--text-body-normal);
    }
    .pdf-page-info {
      font-size: var(--text-body-normal);
      color: var(--text-secondary);
      min-width: 60px;
      text-align: center;
    }

    .pdf-sheet-body {
      flex: 1;
      overflow: auto;
      padding: 16px;
      text-align: center;
      -webkit-overflow-scrolling: touch;
    }
    .pdf-sheet-body canvas {
      max-width: 100%;
      border-radius: var(--radius-md);
    }

    /* ═══════════ Mobile ═══════════ */
    @media (max-width: 768px) {
      .main { max-width: 100%; padding: 16px 12px 88px; }
      .reg-bookmark-tabs { padding: 0 12px; gap: 6px; }
      .reg-bookmark-tab { font-size: var(--text-body-large); padding: 12px 8px 10px; }
      .reg-article-header { padding: 12px 14px; }
      .reg-chat-container {
        height: calc(100dvh - 230px);
        max-height: none;
        border-radius: 14px;
        box-shadow: 3px 3px 0 #1a1a1a;
      }
      .chat-row { max-width: 94%; }
      .chat-bubble { font-size: 13px; padding: 10px 12px; }
    }
  </style>
  <!-- FOUC 방지: PIN 활성화 시 body 숨김 (appLock.js가 오버레이 렌더 후 복원) -->
  <script>(function(){try{var s=JSON.parse(localStorage.getItem('bhm_settings')||'{}');if(s.pinEnabled){document.documentElement.style.visibility='hidden';}}catch(e){}})();</script>
</head>

<body>
  <!-- ═══════════ Header & Footer (shared-layout.js에서 렌더) ═══════════ -->
  <header id="sharedHeader"></header>
  <nav id="sharedFooter"></nav>
  <script src="appLock.js?v=1.0"></script>
  <script src="shared-layout.js?v=1.4"></script>

  <!--
    물어보기 탭 제거됨. 차후 AI 질문 기능 고도화 시 재도입 예정.
    단일 규정 탭만 유지.
  -->
  <nav class="reg-bookmark-tabs" id="regSubTabs" style="display:none;">
    <button class="reg-bookmark-tab active" data-subtab="browse">규정</button>
  </nav>

  <main class="main">

    <!-- ═══════════ 찾아보기 (단체협약 규정) ═══════════ -->
    <div class="sub-content active" id="subtab-browse">
      <!-- 검색 -->
      <div class="card" style="padding:12px 16px; margin-bottom:8px;">
        <input type="text" id="browseSearch" class="reg-search-input"
          placeholder="규정 검색... (예: 연차, 야간수당, 경조비)" style="width:100%;">
      </div>

      <!-- 안내: 원문 번호 유지 정책 -->
      <div class="reg-info-banner">
        📘 <b>2026 단체협약 원문</b> 기준.
        <span style="opacity:0.8;">일부 조항 번호(예: 제13~17조, 제19~31조)는 단체협약 갱신 과정에서 <b>삭제·통합된 번호</b>이며 현행 협약에 존재하지 않습니다.</span>
      </div>

      <!-- 📖 목차 (장 가로 스크롤 탭 + 좌우 화살표) -->
      <div class="reg-section-label">📖 목차</div>
      <div class="reg-chapter-nav-wrap">
        <button type="button" class="reg-chapter-arrow left" onclick="scrollChapterTabs(-1)" aria-label="이전 장">◀</button>
        <div class="reg-chapter-tabs" id="browseChapterTabs"></div>
        <button type="button" class="reg-chapter-arrow right" onclick="scrollChapterTabs(1)" aria-label="다음 장">▶</button>
      </div>

      <!-- ⭐ 즐겨찾기 (가로 스크롤 칩) -->
      <div class="reg-section-label">⭐ 즐겨찾기</div>
      <div class="reg-fav-chips" id="browseFavChips"></div>

      <!-- 조항 리스트 -->
      <div id="browseArticles" style="margin-top:12px;"></div>
    </div>

    <!-- ═══════════ 물어보기 ═══════════ -->
    <div class="sub-content" id="subtab-ask">
      <div class="reg-chat-container">
        <div class="reg-chat-header">
          <img class="chat-header-avatar" src="snuhmaterect.png" alt="SNUH Mate">
          <div class="chat-header-info">
            <div class="chat-header-title">
              SNUH Mate
              <span class="chat-header-badge">2026 단체협약</span>
            </div>
            <div class="chat-header-sub">규정 기반 AI 상담 · 정확한 조항 안내</div>
          </div>
        </div>
        <div class="reg-chat-messages" id="chatMessages"></div>
        <div class="reg-chat-input-row">
          <input type="text" class="chat-input" id="chatInput"
            placeholder="궁금한 점을 입력하세요..." autocomplete="off">
          <button class="chat-send" id="chatSend" title="전송">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>

  </main>

  <!-- ═══════════ PDF 바텀시트 ═══════════ -->
  <div class="pdf-sheet-overlay" id="pdfOverlay">
    <div class="pdf-sheet" id="pdfSheet">
      <div class="pdf-sheet-handle"></div>
      <div class="pdf-sheet-header">
        <span class="pdf-sheet-title" id="pdfSheetTitle">PDF 원문</span>
        <button class="pdf-sheet-close" id="pdfClose" title="닫기">✕</button>
      </div>
      <div class="pdf-sheet-controls">
        <button class="btn btn-outline" onclick="pdfPrevPage()">◀</button>
        <span id="pdfPageInfo" class="pdf-page-info">- / -</span>
        <button class="btn btn-outline" onclick="pdfNextPage()">▶</button>
        <span style="width:1px; height:20px; background:var(--border-glass);"></span>
        <button class="btn btn-outline" onclick="pdfZoom(-0.25)">−</button>
        <span id="pdfZoomInfo" class="pdf-page-info">100%</span>
        <button class="btn btn-outline" onclick="pdfZoom(0.25)">+</button>
      </div>
      <div class="pdf-sheet-body" id="pdfSheetBody">
        <canvas id="pdfCanvas"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="data.js?v=2.9"></script>
  <script src="profile.js?v=2.5"></script>
  <script src="calculators.js?v=2.5"></script>
  <script src="chat-ui.js?v=1.2"></script>
  <script src="regulation.js?v=3.1"></script>
  <style>
    #ch-plugin-script-iframe { max-width: 500px !important; }
  </style>
</body>

</html>
