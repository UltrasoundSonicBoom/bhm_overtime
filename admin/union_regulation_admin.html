<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>규정 상수 통합 관리 — SNUH Mate</title>
  <link rel="stylesheet" href="./admin.css">
  <style>
    body { font-family: 'IBM Plex Sans KR', -apple-system, sans-serif; max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .subtitle { color: #666; font-size: 0.875rem; margin-bottom: 1.5rem; }
    .section { margin-bottom: 2.5rem; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; }
    h2 { font-size: 1.1rem; margin: 0; }
    .badge { font-size: 0.75rem; background: #f0f0f0; border-radius: 4px; padding: 2px 8px; color: #555; }
    .reg-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .reg-table th { text-align: left; padding: 8px 10px; background: #f5f5f5; border-bottom: 2px solid #ddd; font-weight: 600; }
    .reg-table td { padding: 7px 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
    .reg-table tr:hover td { background: #fafafa; }
    .key-cell code { font-size: 0.8rem; background: #f0f4ff; padding: 1px 5px; border-radius: 3px; color: #2a4acc; }
    .ref-cell { color: #777; font-size: 0.8rem; white-space: nowrap; }
    .val-cell { font-family: monospace; font-weight: 500; }
    .desc-cell { color: #555; }
    .copy-btn { font-size: 0.75rem; padding: 2px 8px; border: 1px solid #ddd; border-radius: 3px; background: white; cursor: pointer; }
    .copy-btn:hover { background: #f0f0f0; }
    .sync-warn { color: #c44; background: #fff0f0; border: 1px solid #fcc; padding: 12px 16px; border-radius: 6px; }
    .sync-summary-error { background: #fff0f0; border: 1px solid #fcc; color: #c00; padding: 10px 16px; border-radius: 6px; margin-bottom: 1rem; font-weight: 500; }
    .sync-summary-ok { background: #f0fff4; border: 1px solid #9ce; color: #060; padding: 10px 16px; border-radius: 6px; margin-bottom: 1rem; font-weight: 500; }
    .row-mismatch td { background: #fff8f8; }
    .note-cell { color: #777; font-size: 0.8rem; max-width: 240px; }
    .bug-note { margin-top: 1rem; background: #fffbe6; border: 1px solid #ffe58f; padding: 12px 16px; border-radius: 6px; font-size: 0.85rem; }
    .bug-note code { background: #fff3cd; padding: 1px 4px; border-radius: 3px; }
    .action-bar { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 0.75rem; }
    .btn-primary { padding: 8px 16px; background: #2a4acc; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 0.875rem; }
    .btn-primary:hover { background: #1e3aaa; }
    nav.top-links { margin-bottom: 1.5rem; }
    nav.top-links a { margin-right: 1rem; color: #2a4acc; text-decoration: none; font-size: 0.875rem; }
    nav.top-links a:hover { text-decoration: underline; }
    .last-updated { font-size: 0.75rem; color: #aaa; }
  </style>
</head>
<body>
  <nav class="top-links">
    <a href="index.html">← 규정 Admin</a>
    <a href="../nurse_admin/index.html">배포판</a>
    <a href="../nurse_admin/admin.html">관리자판</a>
  </nav>

  <h1>규정 상수 통합 관리</h1>
  <p class="subtitle">
    <code>regulation-constants.js</code> (프론트엔드) ↔
    <code>nurse_regulation.json</code> (백엔드) 동기화 상태 확인 및 편집 지원
    <span class="last-updated" id="last-updated"></span>
  </p>

  <!-- 섹션 1: 규정 상수 목록 -->
  <div class="section">
    <div class="section-header">
      <h2>규정 상수 목록</h2>
      <span class="badge" id="constants-count">로드 중…</span>
    </div>
    <p class="subtitle">각 항목의 '복사' 버튼으로 <code>키: 값</code> 형식을 클립보드에 복사합니다. 수정 시 개발자에게 전달하세요.</p>
    <div id="constants-container"></div>
  </div>

  <!-- 섹션 2: nurse_regulation.json 동기화 상태 -->
  <div class="section">
    <div class="section-header">
      <h2>nurse_regulation.json 동기화 상태</h2>
      <div class="action-bar">
        <button class="btn-primary" id="copy-report-btn">AI 리포트 JSON 복사</button>
      </div>
    </div>
    <p class="subtitle">
      두 시스템(프론트/백엔드)의 핵심 수치 비교입니다. 🔴 불일치 항목은 수정이 필요합니다.
    </p>
    <div id="sync-container"></div>
  </div>

  <script src="./union_regulation_admin.js"></script>
  <script>
    document.getElementById('last-updated').textContent =
      ' — ' + new Date().toLocaleDateString('ko-KR');
    document.addEventListener('DOMContentLoaded', () => {
      const count = document.querySelectorAll('#constants-table tbody tr').length;
      const badge = document.getElementById('constants-count');
      if (badge && count > 0) badge.textContent = `${count}개 상수`;
    });
  </script>
</body>
</html>
