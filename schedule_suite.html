<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SNUH Mate unified schedule suite">
  <title>SNUH Mate 최종 운영 화면</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./schedule_suite.css">
</head>
<body>
  <header class="suite-top">
    <div class="brand-block">
      <img class="brand-mark" src="./snuhmatecircle.png" alt="SNUH Mate 로고">
      <div>
        <p class="eyebrow">Unified Schedule Suite</p>
        <h1>배포 · 관리자 · 대시보드</h1>
        <p class="subtitle">실제 팀원 데이터와 알고리즘으로 검증한 10개 테스트셋 결과까지 한 화면에서 확인합니다.</p>
      </div>
    </div>
    <nav class="top-links">
      <a href="./nurse_admin/index.html">배포판</a>
      <a href="./nurse_admin/admin.html">관리자판</a>
      <a href="./dashboard.html">검증판</a>
    </nav>
  </header>

  <main class="suite-shell">
    <section id="heroSummary" class="hero-summary">최종 리포트를 불러오는 중입니다.</section>

    <section class="control-strip">
      <div id="teamTabs" class="tab-row"></div>
      <div id="viewTabs" class="tab-row"></div>
    </section>

    <section id="statusGrid" class="status-grid"></section>

    <section id="viewMount" class="view-mount">화면을 준비하는 중입니다.</section>

    <section class="card">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Ten Testsets</p>
          <h2>실제 팀원 기반 검증 랩</h2>
        </div>
      </div>
      <div id="testsetGrid" class="testset-grid">테스트셋 결과를 불러오는 중입니다.</div>
    </section>
  </main>

  <script src="./schedule_suite.js"></script>
</body>
</html>
