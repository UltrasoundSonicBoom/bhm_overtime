<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SNUH Mate Team Board">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    img-src 'self' data: https://*.googleusercontent.com;
    font-src 'self' https://fonts.gstatic.com;
    connect-src 'self' https://*.googleapis.com https://oauth2.googleapis.com https://accounts.google.com https://*.supabase.co;
    frame-src 'self' https://accounts.google.com;
    object-src 'none';
    base-uri 'self';
  ">
  <title>SNUH Mate 팀 보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./publish.css">
</head>
<body>
  <header class="publish-top">
    <div class="brand-block">
      <img class="brand-mark" src="../snuhmatecircle.png" alt="SNUH Mate 로고">
      <div>
        <p class="eyebrow">Viewer</p>
        <h1>팀 보드</h1>
        <p class="subtitle">오늘 누구와 근무하는지, 확정된 근무표가 어떤지 바로 확인합니다.</p>
      </div>
    </div>
  </header>

  <section class="utility-strip">
    <nav class="viewer-tabs" aria-label="viewer pages">
      <a class="viewer-tab active" href="./index.html">팀 보드</a>
      <a class="viewer-tab" id="myDayLink" href="./my-day.html">내 일정</a>
    </nav>
    <details class="utility-menu">
      <summary>운영 도구</summary>
      <div class="utility-menu-panel">
        <a href="./admin.html">운영 콘솔</a>
        <a href="../admin/index.html">규정</a>
      </div>
    </details>
  </section>

  <main class="publish-shell">
    <section class="control-bar">
      <label class="field">
        <span>팀</span>
        <select id="teamSelect"></select>
      </label>
      <label class="field">
        <span>기간</span>
        <input id="periodInput" type="month">
      </label>
      <label class="field grow">
        <span>이름 검색</span>
        <input id="memberSearchInput" type="search" placeholder="이름, 역할, 태그">
      </label>
      <label class="field">
        <span>강조 인물</span>
        <select id="memberSelect"></select>
      </label>
      <a id="myDayActionLink" class="action-btn" href="./my-day.html">내 일정</a>
    </section>

    <section id="focusBanner" class="focus-banner">오늘 근무 정보를 준비하는 중입니다.</section>
    <section class="status-grid" id="statusGrid"></section>
    <section class="crew-card">
      <strong>같이 일하는 사람</strong>
      <div id="todayCrewPanel">같이 일하는 사람을 불러오는 중입니다.</div>
    </section>

    <section class="board-card">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Board</p>
          <h2 id="boardHeadline">확정 근무표를 불러오는 중입니다.</h2>
        </div>
        <div id="publishMeta" class="publish-meta">대기 중</div>
      </div>

      <p class="eyebrow">근무조 선택</p>
      <div id="shiftFocusBar" class="shift-focus-bar" aria-label="근무조 선택"></div>
      <div id="shiftFocusMeta" class="shift-focus-meta">근무조 정보를 불러오는 중입니다.</div>

      <div class="legend-row">
        <span class="legend-chip shift-D">D</span>
        <span class="legend-chip shift-E">E</span>
        <span class="legend-chip shift-N">N</span>
        <span class="legend-chip shift-OFF">OFF</span>
        <span class="legend-chip shift-LEAVE">LEAVE</span>
        <span class="legend-chip shift-EDU">EDU</span>
      </div>

      <div id="publishedBoard" class="board-shell">배포본을 불러오는 중입니다.</div>
    </section>
  </main>

  <script src="./demo-data.js"></script>
  <script src="./team-board.js"></script>
</body>
</html>
