<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    img-src 'self' data:;
    font-src 'self' https://fonts.gstatic.com;
    connect-src 'self';
    object-src 'none';
    base-uri 'self';
  ">
  <title>Calculation Flow Graph — SNUH Mate Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./calc-flow.css">
</head>
<body>

<div class="cf-page">

  <!-- ── Sidebar Filter ── -->
  <aside class="cf-sidebar">
    <div class="cf-sidebar-title">Calc Flow Graph</div>

    <!-- Layer Filters -->
    <div class="cf-filter-group">
      <div class="cf-filter-label">Layers</div>
      <div id="cfSidebarLayers"></div>
    </div>

    <!-- Summary Cards -->
    <div class="cf-filter-group">
      <div class="cf-filter-label">Summary</div>
      <div class="cf-summary-grid">
        <div class="cf-summary-card">
          <div class="cf-summary-value" id="cfSummaryNodes">0</div>
          <div class="cf-summary-label">Nodes</div>
        </div>
        <div class="cf-summary-card">
          <div class="cf-summary-value" id="cfSummaryEdges">0</div>
          <div class="cf-summary-label">Edges</div>
        </div>
        <div class="cf-summary-card">
          <div class="cf-summary-value" id="cfSummaryConnected" style="color: var(--cf-green);">0</div>
          <div class="cf-summary-label">Connected</div>
        </div>
        <div class="cf-summary-card">
          <div class="cf-summary-value" id="cfSummaryMissing" style="color: var(--cf-red);">0</div>
          <div class="cf-summary-label">Missing</div>
        </div>
      </div>
    </div>

    <!-- Legend -->
    <div class="cf-legend">
      <div class="cf-legend-title">Legend</div>
      <div class="cf-legend-items">
        <div class="cf-legend-item">
          <div class="cf-legend-line connected"></div>
          Connected
        </div>
        <div class="cf-legend-item">
          <div class="cf-legend-line missing"></div>
          Missing
        </div>
        <div class="cf-legend-item">
          <div class="cf-legend-line partial"></div>
          Partial
        </div>
      </div>
    </div>

    <!-- Back link -->
    <a href="./index.html" style="font-size:12px; color:var(--cf-accent-light); text-decoration:none; margin-top:auto; padding-top:12px; border-top:1px solid var(--cf-border);">
      ← Admin 홈으로
    </a>
  </aside>

  <!-- ── Main Canvas ── -->
  <div class="cf-main">

    <!-- Topbar -->
    <div class="cf-topbar">
      <div class="cf-topbar-title">5-Layer Calculation Flow</div>
      <input type="text" class="cf-search" id="cfSearch" placeholder="노드 검색..." autocomplete="off">
      <div class="cf-zoom-controls">
        <button class="cf-zoom-btn" id="cfZoomIn" type="button" title="Zoom In">+</button>
        <button class="cf-zoom-btn" id="cfZoomOut" type="button" title="Zoom Out">−</button>
        <button class="cf-zoom-btn" id="cfZoomReset" type="button" title="Fit" style="font-size:11px;">Fit</button>
      </div>
    </div>

    <!-- Cytoscape Graph Container -->
    <div id="cy"></div>

  </div>

  <!-- ── Detail Panel ── -->
  <div class="cf-detail" id="cfDetail">
    <div class="cf-detail-header">
      <div class="cf-detail-title"></div>
      <button class="cf-detail-close" id="cfDetailClose" type="button" title="닫기">✕</button>
    </div>
    <div class="cf-detail-body"></div>
  </div>

</div>

<script src="./lib/dagre.min.js"></script>
<script src="./lib/cytoscape.min.js"></script>
<script src="./lib/cytoscape-dagre.js"></script>
<script src="./health-monitor.js"></script>
<script src="./calc-flow.js"></script>
</body>
</html>
